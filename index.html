<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avail — Static HTML Sites</title>
  <meta http-equiv="refresh" content="0; url=avail-website/" />
  <style>
    :root {
      --ink: #212224;
      --muted: #666;
      --card: #f0f0ef;
      --blue: #0048ff;
      --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      color: var(--ink);
      background: #fffffe;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p {
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      display: block;
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
    }
    .primary {
      background: #202224;
      color: #f7f7f7;
    }
    .secondary {
      background: #fffffe;
      color: var(--ink);
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Avail HTML Sites</h1>
    <p>Static marketing and product pages built from Figma.</p>
    <nav class="links">
      <a class="primary" href="avail-website/">Marketing homepage</a>
      <a class="secondary" href="avail-deposit/">Product pages (Deposits, Nexus, DA, Ecosystem…)</a>
    </nav>
  </main>
</body>
</html>
